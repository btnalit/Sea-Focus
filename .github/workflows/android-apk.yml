name: Android APK

on:
  push:
    paths-ignore:
      - 'docs/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

jobs:
  android-release-apk:
    name: Build release APK
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Validate Android CI contract
        run: npm run test:ci-config

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Ensure Android SDK components
        shell: bash
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "${ANDROID_HOME}/cmdline-tools" -path '*/bin/sdkmanager' -type f | sort -V | tail -n 1)"
          fi
          if [ -z "$SDKMANAGER" ] || [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found under ANDROID_HOME=${ANDROID_HOME}" >&2
            find "${ANDROID_HOME}" -maxdepth 4 -type f -name sdkmanager -print >&2 || true
            exit 127
          fi
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Build release APK
        working-directory: android
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.SEA_FOCUS_RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.SEA_FOCUS_RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.SEA_FOCUS_RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.SEA_FOCUS_RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          KEYSTORE_PATH="${RUNNER_TEMP}/sea-focus-ci-release.jks"
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            if [ -z "$RELEASE_STORE_PASSWORD" ] || [ -z "$RELEASE_KEY_ALIAS" ] || [ -z "$RELEASE_KEY_PASSWORD" ]; then
              echo "Release keystore secret is set, but password or alias secrets are missing." >&2
              exit 1
            fi
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
            STORE_PASSWORD="$RELEASE_STORE_PASSWORD"
            KEY_PASSWORD="$RELEASE_KEY_PASSWORD"
            KEY_ALIAS="$RELEASE_KEY_ALIAS"
          else
            STORE_PASSWORD="sea-focus-ci-release"
            KEY_PASSWORD="sea-focus-ci-release"
            KEY_ALIAS="sea-focus-ci-release"
            keytool -genkeypair \
              -v \
              -storetype PKCS12 \
              -keystore "$KEYSTORE_PATH" \
              -alias "$KEY_ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "$STORE_PASSWORD" \
              -keypass "$KEY_PASSWORD" \
              -dname "CN=Sea Focus CI,O=Sea Focus,C=US"
          fi
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: sea-focus-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14
