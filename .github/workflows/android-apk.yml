name: Android APK

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  android-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Validate Android CI contract
        run: npm run test:ci-config

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Ensure Android SDK components
        shell: bash
        run: |
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "${ANDROID_HOME}/cmdline-tools" -path '*/bin/sdkmanager' -type f | sort -V | tail -n 1)"
          fi
          if [ -z "$SDKMANAGER" ] || [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found under ANDROID_HOME=${ANDROID_HOME}" >&2
            find "${ANDROID_HOME}" -maxdepth 4 -type f -name sdkmanager -print >&2 || true
            exit 127
          fi
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sea-focus-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
